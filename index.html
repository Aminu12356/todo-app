<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskly – Get Things Done</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #1a1a23;
      --border:   #2e2e3d;
      --accent:   #7c6ef7;
      --accent2:  #b8a9ff;
      --done:     #3ddbb0;
      --danger:   #f0506a;
      --text:     #e8e8f0;
      --muted:    #7a7a9a;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    header h1 span {
      color: var(--accent2);
    }
    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Card wrapper ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      padding: 28px 24px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .input-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 600;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      transition: background .2s, transform .1s;
      flex-shrink: 0;
    }
    .btn-add:hover { background: #6a5ce0; }
    .btn-add:active { transform: scale(.94); }

    /* ── Filter tabs ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

    /* ── Task list ── */
    #task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      transition: border-color .2s, opacity .2s;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-item:hover { border-color: var(--accent); }
    .task-item.done { opacity: .55; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    /* Custom checkbox */
    .check-wrap {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: all .2s;
    }
    .check-wrap.checked {
      background: var(--done);
      border-color: var(--done);
    }
    .check-wrap svg { display: none; }
    .check-wrap.checked svg { display: block; }

    .task-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
    }

    .btn-del {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
    }
    .btn-del:hover { color: var(--danger); background: rgba(240,80,106,.1); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--muted);
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }
    .stats .count { font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: var(--accent2); }
    .btn-clear {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: color .2s;
    }
    .btn-clear:hover { color: var(--danger); }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 20px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .progress-track {
      background: var(--border);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--done));
      height: 100%;
      border-radius: 100px;
      transition: width .4s ease;
    }
  </style>
</head>
<body>

  <header>
    <div class="eyebrow">Your Daily Planner</div>
    <h1>Task<span>ly</span></h1>
    <p>Stay focused. Ship things. One task at a time.</p>
  </header>

  <div class="card">
    <!-- Input -->
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task…" maxlength="120"/>
      <button class="btn-add" id="add-btn" title="Add task">+</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <!-- List -->
    <ul id="task-list"></ul>

    <!-- Stats -->
    <div class="stats" id="stats" style="display:none">
      <span><span class="count" id="remaining-count">0</span> task(s) left</span>
      <button class="btn-clear" id="clear-btn">Clear completed</button>
    </div>
  </div>

  <script>
    const input       = document.getElementById('task-input');
    const addBtn      = document.getElementById('add-btn');
    const taskList    = document.getElementById('task-list');
    const statsEl     = document.getElementById('stats');
    const remainingEl = document.getElementById('remaining-count');
    const clearBtn    = document.getElementById('clear-btn');
    const progressWrap= document.getElementById('progress-wrap');
    const progressFill= document.getElementById('progress-fill');
    const progressPct = document.getElementById('progress-pct');
    const filterBtns  = document.querySelectorAll('.filter-btn');

    let tasks  = JSON.parse(localStorage.getItem('taskly-tasks') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('taskly-tasks', JSON.stringify(tasks));
    }

    function render() {
      taskList.innerHTML = '';
      const visible = tasks.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done :
                               t.done
      );

      if (visible.length === 0) {
        taskList.innerHTML = `
          <li class="empty">
            <div class="icon">${filter === 'done' ? '✅' : '📋'}</div>
            <p>${filter === 'done' ? 'Nothing completed yet.' : 'No tasks here. Add one above!'}</p>
          </li>`;
      } else {
        visible.forEach(t => {
          const li = document.createElement('li');
          li.className = 'task-item' + (t.done ? ' done' : '');
          li.innerHTML = `
            <div class="check-wrap ${t.done ? 'checked' : ''}" data-id="${t.id}" title="${t.done ? 'Mark active' : 'Mark done'}">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5l3.5 3.5L11 1" stroke="#0f0f13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="task-text">${escHtml(t.text)}</span>
            <button class="btn-del" data-id="${t.id}" title="Delete task">✕</button>
          `;
          taskList.appendChild(li);
        });
      }

      // Stats
      const total    = tasks.length;
      const doneCount= tasks.filter(t => t.done).length;
      const remaining= total - doneCount;
      statsEl.style.display   = total ? 'flex' : 'none';
      progressWrap.style.display = total ? 'block' : 'none';
      remainingEl.textContent = remaining;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;
      progressFill.style.width = pct + '%';
      progressPct.textContent  = pct + '%';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save(); render();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    taskList.addEventListener('click', e => {
      const checkEl = e.target.closest('.check-wrap');
      const delEl   = e.target.closest('.btn-del');
      if (checkEl) {
        const id = Number(checkEl.dataset.id);
        tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
        save(); render();
      }
      if (delEl) {
        const id = Number(delEl.dataset.id);
        tasks = tasks.filter(t => t.id !== id);
        save(); render();
      }
    });

    clearBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save(); render();
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    render();
  </script>
</body>
</html>
